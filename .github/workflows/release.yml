name: Release to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      # OIDC trusted publishing — no NPM_TOKEN needed.
      # Configure the trust relationship at:
      #   https://www.npmjs.com/package/bodhi-realtime-agent/access
      - name: Publish to npm
        run: npm publish --provenance --access public
